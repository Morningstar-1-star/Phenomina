    <style>

        @keyframes scaleIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .nav-fab:active { transform: scale(0.8); }

        /* ── SKELETON LOADING ── */
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

<script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
        Search, Sparkles, X, Link as LinkIcon, FileText, Play, Send, Bot,
        Folder, Trash2, Settings, Star, Share2, Loader, Plus, ChevronLeft, 
        ChevronDown, ChevronUp, MessageSquare, Heart, Bookmark, LayoutGrid, 
        Grid3X3, List, Layout, Square, Download, Tag, Mail, Key, Edit3, Clapperboard,
        Volume2, VolumeX, MoreHorizontal, Home as HomeIcon, User, Moon, Sun, Palette, Code, Camera
    } from 'lucide-react';
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, onSnapshot, query, addDoc, doc, deleteDoc, updateDoc } from "firebase/firestore";
    import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "firebase/auth";

    // Firebase Initialization
    const firebaseConfig = { apiKey: "AIzaSyDYb0bGc-QxMv9Cgd-r6CwxPvjKmACPV5A", authDomain: "planning-with-ai-7f4db.firebaseapp.com", projectId: "planning-with-ai-7f4db", storageBucket: "planning-with-ai-7f4db.firebasestorage.app", messagingSenderId: "5792058693", appId: "1:5792058693:web:9a132f1bc3aaf60e791ead" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const APP_ID = 'nexus-v8';
    const IMGBB_KEY = '3414f02c69be9032899abd55f7b09719';
    const CLOUDINARY_CLOUD = 'dw3xg7be9';
    const CLOUDINARY_PRESET = localStorage.getItem('nxs_cl_preset') || '';

    const THEMES = { orange: '249, 115, 22', cyan: '6, 182, 212', green: '34, 197, 94', purple: '168, 85, 247', rose: '244, 63, 94', pintrest: '230, 0, 35' };

    // Utility Functions
    const getDomain = (url) => { try { return new URL(url.startsWith('http')?url:`https://${url}`).hostname.replace('www.', ''); } catch(e) { return 'Local'; } };

    // ── GOOGLE DRIVE LINK CONVERTER ──
    const convertDriveUrl = (url) => {
        if (!url) return url;
        const m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
        if (m) return { streamUrl: `https://drive.google.com/file/d/${m[1]}/preview`, fileId: m[1], isDrive: true };
        const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
        if (m2) return { streamUrl: `https://drive.google.com/file/d/${m2[1]}/preview`, fileId: m2[1], isDrive: true };
        return null;
    };
    const isDriveUrl = (url) => !!(url && (url.includes('drive.google.com') || url.includes('docs.google.com')));

    // ── IMGBB UPLOAD ──
    const uploadToImgBB = async (file) => {
        const fd = new FormData();
        fd.append('image', file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
        const data = await res.json();
        if (!data.success) throw new Error('ImgBB upload failed');
        return data.data.url;
    };

    // ── CLOUDINARY UPLOAD ──
    const uploadToCloudinary = async (file) => {
        if (!CLOUDINARY_PRESET) return null;
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', CLOUDINARY_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/auto/upload`, { method: 'POST', body: fd });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        return data.secure_url;
    };

    // ── DUAL UPLOAD (ImgBB primary, Cloudinary backup) ──
    const uploadMediaFile = async (file) => {
        const results = await Promise.allSettled([uploadToImgBB(file), uploadToCloudinary(file)]);
        const imgbbUrl = results[0].status === 'fulfilled' ? results[0].value : null;
        const cloudUrl = results[1].status === 'fulfilled' ? results[1].value : null;
        if (!imgbbUrl && !cloudUrl) throw new Error('Both uploads failed');
        return { primary: imgbbUrl || cloudUrl, imgbbUrl, cloudUrl };
    };

    const getMediaType = (url) => {
        if (!url) return 'link';
        const s = url.toLowerCase();
        if (s.includes('drive.google.com') || s.includes('docs.google.com')) return 'drive';
        if (s.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|shorts\/|embed\/))([A-Za-z0-9_-]{11})/)) return 'youtube';
        if (s.includes('.m3u8')) return 'hls';
        if (s.match(/\.(mp4|webm|ogg)(\?.*)?$/) || s.startsWith('data:video')) return 'video';
        if (s.match(/\.(mp3|wav|m4a|aac)(\?.*)?$/) || s.startsWith('data:audio')) return 'audio';
        if (s.match(/\.(jpg|jpeg|png|gif|webp|avif|bmp)(\?.*)?$/) || s.startsWith('data:image')) return 'image';
        return 'link';
    };

    const fetchMetaImage = async (url) => {

        if (url.includes('pinterest.com') || url.includes('pin.it')) {
            try {
                const cleanUrl = url.split('#')[0];
                const res = await fetch(`https://cold-recipe-0359.ggam1097.workers.dev/?url=${encodeURIComponent(cleanUrl)}`);
                const data = await res.json();
                if (data.image) return data.image;
            } catch(e) {}
            return null;
        }
        try {
            const res = await fetch(`https://api.microlink.io?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            if (data.data?.image?.url) return data.data.image.url;
        } catch(e) {}
        try {
            const res = await fetch(`https://api.dub.co/metatags?url=${encodeURIComponent(url)}`);

            if (data.image) return data.image;

    };

        if (item.type === 'youtube') {
            const match = item.url?.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|shorts\/|embed\/))([A-Za-z0-9_-]{11})/);
            return match ? `https://img.youtube.com/vi/${match[1]}/hqdefault.jpg` : null;
        }
        if (item.type === 'drive' && item.url) {
            const m = item.url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w400`;

        return h > 0 ? `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}` : `${m}:${s.toString().padStart(2,'0')}`;

    const generateVideoMeta = (url, type) => {
        return new Promise((resolve) => {
            const video = document.createElement('video');
            video.crossOrigin = 'anonymous'; video.muted = true; video.playsInline = true;
            
            const finish = (thumb, duration, isPortrait) => { resolve({ thumb, duration, isPortrait }); video.pause(); video.removeAttribute('src'); video.load(); };
            
            video.addEventListener('loadeddata', () => { video.currentTime = isFinite(video.duration) ? Math.min(2, video.duration * 0.1) : 1; });
            video.addEventListener('seeked', () => {
                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 640; canvas.height = video.videoHeight || 360;
                    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                    const isPortrait = canvas.height > canvas.width;
                    finish(canvas.toDataURL('image/jpeg', 0.6), video.duration, isPortrait);
                } catch (e) { finish(null, video.duration, false); }
            });
            video.addEventListener('error', () => finish(null, null, false));
            setTimeout(() => finish(null, video.duration || null, false), 8000);

            if (type === 'hls' && window.Hls && window.Hls.isSupported()) {
                const hls = new window.Hls({ startLevel: 0, maxBufferLength: 2, enableWorker: false });
                hls.loadSource(url); hls.attachMedia(video);

            const checkOrientation = () => {
                const landscape = window.innerWidth > window.innerHeight;
                setIsLandscape(landscape);
            };
            checkOrientation();
            window.addEventListener('resize', checkOrientation);
            return () => window.removeEventListener('resize', checkOrientation);
        }, []);

        const handleVideoClick = (v) => {
            if (isLandscape) setActiveLandscape(v);
            else onSelectVideo(v);
        };

        const trending = videos.slice(0, 5);
        const forYou = videos.slice(0);

        if (videos.length === 0) return (
            <div className="absolute inset-0 z-10 flex items-center justify-center flex-col animate-in pb-20">
                <Play className="w-16 h-16 opacity-20 mb-4" style={{color:'white'}}/>
                <p className="font-bold uppercase tracking-widest text-sm" style={{color:'rgba(255,255,255,0.4)'}}>No Videos Yet</p>
            </div>
        );

        return (
            <>
                <div className="video-feed-container hide-scroll animate-in">
                    {/* Trending Section — horizontal scroll */}
                    {trending.length > 0 && (
                        <div className="mb-6">
                            <p className="feed-section-head">Trending</p>
                            <div className="trending-scroll">
                                {trending.map(v => {
                                    const thumb = getThumbnail(v);
                                    return (
                                        <div key={v.id} className="trending-card" onClick={() => handleVideoClick(v)}>
                                            <div style={{position:'relative'}}>
                                                {thumb ? <img src={thumb} alt={v.title} loading="lazy"/> : <div style={{width:'100%',aspectRatio:'16/9',background:'#222',display:'flex',alignItems:'center',justifyContent:'center'}}><Play style={{width:24,height:24,color:'rgba(255,255,255,0.3)'}}/></div>}
                                                <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.25)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                                                    <div style={{width:36,height:36,borderRadius:'50%',background:'rgba(0,0,0,0.5)',backdropFilter:'blur(6px)',border:'1.5px solid rgba(255,255,255,0.2)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                                                        <Play style={{width:14,height:14,color:'white',fill:'white',marginLeft:2}}/>
                                                    </div>
                                                </div>
                                                {v.duration && <span className="vid-duration-badge">{formatDuration(v.duration)}</span>}
                                            </div>
                                            <div className="trending-card-info">
                                                <div className="trending-card-title">{v.title || 'Untitled'}</div>
                                                <div className="trending-card-sub">
                                                    <span>{v.artist || getDomain(v.site || v.url || '')}</span>
                                                    <span>{formatNumber((v.savedAt%1000)*432)} views</span>
                                                </div>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    )}

                    {/* For You — full-width vertical feed */}
                    <p className="feed-section-head" style={{paddingTop:4}}>For you</p>
                    <div>
                        {forYou.map(v => {
                            const thumb = getThumbnail(v);
                            return (
                                <div key={v.id} className="vid-card" onClick={() => handleVideoClick(v)}>
                                    <div className="vid-card-thumb">
                                        {thumb ? <img src={thumb} alt={v.title} loading="lazy"/> : (
                                            <div style={{width:'100%',height:'100%',background:'#111',display:'flex',alignItems:'center',justifyContent:'center'}}>
                                                <Play style={{width:32,height:32,color:'rgba(255,255,255,0.2)'}}/>
                                            </div>
                                        )}
                                        <div className="vid-play-btn">
                                            <div className="vid-play-circle">
                                                <Play style={{width:22,height:22,color:'white',fill:'white',marginLeft:3}}/>
                                            </div>
                                        </div>
                                        {v.duration && <span className="vid-duration-badge">{formatDuration(v.duration)}</span>}
                                    </div>
                                    <div className="vid-meta">
                                        <div className="vid-avatar">{(v.artist || v.title || '?')[0].toUpperCase()}</div>
                                        <div className="vid-info">
                                            <div className="vid-title">{v.title || 'Unknown Transmission'}</div>
                                            <div className="vid-sub">
                                                <span>{v.artist || getDomain(v.site || v.url || '')}</span>
                                                <span style={{color:'rgba(255,255,255,0.15)'}}>•</span>
                                                <span>{formatNumber((v.savedAt%1000)*432)} views</span>
                                            </div>
                                        </div>
                                        <button className="active-bounce btn-pop p-2 rounded-full" style={{color:'var(--text-muted)',background:'transparent',border:'none',cursor:'pointer'}} onClick={e=>{e.stopPropagation();}}>
                                            <MoreHorizontal style={{width:20,height:20}}/>
                                        </button>
                                    </div>
                                    <div className="vid-stats-row">
                                        <div className="vid-stat"><Heart style={{width:16,height:16}}/>{formatNumber(Math.floor((v.savedAt||1)%500)*87)}</div>
                                        <div className="vid-stat"><MessageSquare style={{width:16,height:16}}/>{formatNumber(Math.floor((v.savedAt||1)%100)*12)}</div>
                                        <div className="vid-stat"><Share2 style={{width:16,height:16}}/>{formatNumber(Math.floor((v.savedAt||1)%50)*23)}</div>
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                </div>

                {/* Landscape scroll player */}
                {activeLandscape && (
                    <div className="landscape-player-overlay scale-in" style={{background:'#000'}}>
                        <div style={{position:'absolute',top:16,left:16,right:16,display:'flex',justifyContent:'space-between',alignItems:'center',zIndex:10}}>
                            <div style={{display:'flex',alignItems:'center',gap:10}}>
                                <div className="vid-avatar" style={{width:32,height:32,fontSize:12}}>{(activeLandscape.artist||activeLandscape.title||'?')[0].toUpperCase()}</div>
                                <span style={{color:'white',fontWeight:700,fontSize:13}}>{activeLandscape.artist||getDomain(activeLandscape.url||'')}</span>
                            </div>
                            <button onClick={() => setActiveLandscape(null)} className="active-bounce btn-pop" style={{width:36,height:36,borderRadius:'50%',background:'rgba(255,255,255,0.15)',backdropFilter:'blur(8px)',border:'1px solid rgba(255,255,255,0.2)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',cursor:'pointer'}}>
                                <X style={{width:18,height:18}}/>
                            </button>
                        </div>
                        {activeLandscape.type === 'youtube' ? (
                            <iframe src={`https://www.youtube.com/embed/${activeLandscape.url?.match(/([A-Za-z0-9_-]{11})/)?.[1]}?autoplay=1`} style={{width:'100%',height:'100%',border:'none'}} allowFullScreen allow="autoplay"/>
                        ) : (
                            <video src={activeLandscape.url} controls autoPlay playsInline style={{width:'100%',height:'100%',objectFit:'contain'}}/>
                        )}
                        <div style={{position:'absolute',bottom:20,insetInline:0,display:'flex',justifyContent:'center',gap:36,zIndex:10}}>
                            {[
                                {icon:<Heart style={{width:22,height:22}}/>, label:formatNumber(Math.floor((activeLandscape.savedAt||1)%500)*87)},
                                {icon:<MessageSquare style={{width:22,height:22}}/>, label:formatNumber(Math.floor((activeLandscape.savedAt||1)%100)*12)},
                                {icon:<Bookmark style={{width:22,height:22}}/>, label:formatNumber(Math.floor((activeLandscape.savedAt||1)%200)*5)},
                                {icon:<Share2 style={{width:22,height:22}}/>, label:formatNumber(Math.floor((activeLandscape.savedAt||1)%50)*23)},
                            ].map((a,i) => (
                                <button key={i} className="active-bounce btn-pop" style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,color:'rgba(255,255,255,0.8)',fontWeight:700,fontSize:11,background:'none',border:'none',cursor:'pointer'}}>
                                    {a.icon}{a.label}
                                </button>
                            ))}
                        </div>
                    </div>
                )}
            </>
        );
    };

    const WatchSection = ({ items, onUpdate, onSelectVideo, onBack }) => {
        const [subTab, setSubTab] = useState('videos');
        
        const allMedia = useMemo(() => items.filter(i => ['video', 'hls', 'youtube', 'drive'].includes(i.type)), [items]);
        const reels = useMemo(() => allMedia.filter(i => i.isPortrait !== false), [allMedia]); 
        const videos = useMemo(() => allMedia, [allMedia]);

        return (
            <div className="absolute inset-0" style={{background: subTab === 'reels' ? '#000' : 'var(--bg-base)'}}>
                {/* Top Navigation */}
                <div className="watch-header pointer-events-none">
                    <button onClick={onBack} className="btn-pop active-bounce pointer-events-auto" style={{width:40,height:40,borderRadius:'50%',background:'rgba(255,255,255,0.12)',backdropFilter:'blur(10px)',border:'1px solid rgba(255,255,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',cursor:'pointer'}}>
                        <ChevronLeft style={{width:22,height:22}}/>
                    </button>

                    <div className="watch-tabs pointer-events-auto">
                        <button className={`watch-tab-btn ${subTab==='reels'?'active':''}`} onClick={()=>setSubTab('reels')}>Reels</button>
                        <button className={`watch-tab-btn ${subTab==='videos'?'active':''}`} onClick={()=>setSubTab('videos')}>Videos</button>
                    </div>

                    <button className="btn-pop active-bounce pointer-events-auto" style={{width:40,height:40,borderRadius:'50%',background:'rgba(255,255,255,0.12)',backdropFilter:'blur(10px)',border:'1px solid rgba(255,255,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',cursor:'pointer'}}>
                        <Camera style={{width:20,height:20}}/>
                    </button>
                </div>

                {subTab === 'reels' ? (
                    <ReelsFeed reels={allMedia} onUpdate={onUpdate} />
                ) : (
                    <VideoFeed videos={videos} onSelectVideo={onSelectVideo} />
                )}
            </div>
        )
    };

    /* ═══ ITEM VIEWER ═══ */
    const DriveVideoPlayer = ({ url }) => {
        const fileId = url?.match(/\/file\/d\/([a-zA-Z0-9_-]+)/)?.[1];
        if (!fileId) return null;
        return (
            <iframe
                src={`https://drive.google.com/file/d/${fileId}/preview`}
                style={{width:'100%',height:'100%',border:'none',display:'block'}}
                allowFullScreen
                allow="autoplay; fullscreen"
            />
        );
    };

    const ItemViewer = ({ item, allItems, onClose, onUpdate, onDelete, onAI, onTagClick }) => {
        if (!item) return null;
        const [showTagInput, setShowTagInput] = useState(false); const [newTag, setNewTag] = useState('');
        const [showComments, setShowComments] = useState(false); const [newComment, setNewComment] = useState('');
        const [descExpanded, setDescExpanded] = useState(false); const [isEditingMeta, setIsEditingMeta] = useState(false);
        const [metaForm, setMetaForm] = useState({ artist: item.artist||'', character: item.character||'', source: item.source||'' });

        const tags = item.tags || []; const comments = item.comments || []; const cleanDomain = getDomain(item.url || item.site);
        const isVideoNode = ['video', 'hls', 'youtube', 'drive'].includes(item.type);
        const itemThumb = getThumbnail(item);

        const related = useMemo(() => {
            return allItems.filter(i => i.id !== item.id && (
                (i.artist && i.artist === item.artist) || (i.character && i.character === item.character) ||
                (i.tags && item.tags && i.tags.some(t => item.tags.includes(t))) || (i.type === item.type)
            )).slice(0, 10);
        }, [item, allItems]);

        const toggleLike = () => onUpdate(item.id, { liked: !item.liked });
        const togglePin = () => onUpdate(item.id, { pinned: !item.pinned });
        const handleAddTag = (e) => { if (e.key === 'Enter' && newTag.trim()) { onUpdate(item.id, { tags: [...new Set([...tags, newTag.trim().toLowerCase()])] }); setNewTag(''); setShowTagInput(false); } };
        const removeTag = (t, e) => { e.stopPropagation(); onUpdate(item.id, { tags: tags.filter(tag => tag !== t) }); };
        const handleAddComment = () => { if (!newComment.trim()) return; onUpdate(item.id, { comments: [...comments, { text: newComment.trim(), date: Date.now() }] }); setNewComment(''); };
        const executeTagClick = (t) => { onClose(); if(onTagClick) onTagClick(t); }

        return (
            <div className="viewer-overlay animate-in">
                {/* Top bar — back + delete */}
                <div style={{position:'absolute',top:0,left:0,right:0,padding:'calc(var(--safe-top) + 8px) 16px 12px 16px',zIndex:50,display:'flex',justifyContent:'space-between',alignItems:'center',background:'rgba(0,0,0,0.55)',backdropFilter:'blur(10px)',borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
                    <button onClick={onClose} className="active-bounce btn-pop" style={{width:40,height:40,borderRadius:'50%',background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.12)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',cursor:'pointer'}}>
                        <ChevronLeft style={{width:22,height:22}}/>
                    </button>
                    <span style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:15,color:'rgba(255,255,255,0.9)',letterSpacing:1,textTransform:'uppercase',maxWidth:'60%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.title || 'Item'}</span>
                    <button onClick={() => onDelete(item.id)} className="active-bounce btn-pop" style={{width:40,height:40,borderRadius:'50%',background:'rgba(220,38,38,0.15)',border:'1px solid rgba(220,38,38,0.25)',display:'flex',alignItems:'center',justifyContent:'center',color:'#f87171',cursor:'pointer'}}>
                        <Trash2 style={{width:18,height:18}}/>
                    </button>
                </div>

                {/* Media area */}
                {isVideoNode ? (
                    <div className="cinematic-wrapper" style={{marginTop:'calc(var(--safe-top) + 64px)', maxHeight: item.type==='drive' ? '56vh' : '42vh'}}>
                        <div className="viewer-media-container">
                            {item.type === 'youtube' ? (
                                <iframe src={`https://www.youtube.com/embed/${item.url?.match(/([A-Za-z0-9_-]{11})/)?.[1]}?autoplay=1`} style={{width:'100%',height:'100%',border:'none'}} allowFullScreen allow="autoplay" />
                            ) : item.type === 'drive' ? (
                                (() => {
                                    return (
                                        <DriveVideoPlayer url={item.url} />
                                    );
                                })()
                            ) : (
                                <video src={item.url} id={`vid-${item.id}`} controls autoPlay className="viewer-media" playsInline />
                            )}
                        </div>
                    </div>
                ) : (
                    <div style={{marginTop:'calc(var(--safe-top) + 64px)',flexShrink:0,background:'var(--bg-panel)',display:'flex',justifyContent:'center',alignItems:'center',minHeight:'38vh',maxHeight:'48vh',overflow:'hidden'}}>
                        {item.type === 'embed' ? (
                            <iframe srcDoc={`<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{margin:0;padding:16px;color:#f0f0f0;font-family:'Space Mono',monospace;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;background:#000;text-align:center;}h1,h2,h3{font-family:'Syne',sans-serif;margin:0 0 8px 0;font-size:2rem;color:white;}p{margin:0;color:#888899;font-weight:bold;text-transform:uppercase;letter-spacing:2px;}</style></head><body><div id="weather"></div><div id="app"></div><div id="root"></div>${item.content}</body></html>`} style={{width:'100%',height:'38vh',border:'none',background:'#000'}} sandbox="allow-scripts allow-same-origin allow-popups allow-forms"/>
                        ) : item.type === 'note' ? (
                            <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',padding:32}}>
                                <p style={{fontSize:18,fontWeight:700,whiteSpace:'pre-wrap',textAlign:'center',color:'var(--text-main)',maxHeight:'38vh',overflowY:'auto'}}>{item.content}</p>
                            </div>
                        ) : itemThumb ? (
                            <img src={itemThumb} style={{maxWidth:'100%',maxHeight:'46vh',objectFit:'contain'}} onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }}/>
                        ) : (
                            <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}><LinkIcon style={{width:48,height:48,color:'var(--text-muted)'}}/></div>
                        )}
                        <div style={{display:'none',width:'100%',height:'100%',alignItems:'center',justifyContent:'center'}}><LinkIcon style={{width:48,height:48,color:'var(--text-muted)'}}/></div>
                    </div>
                )}

                {/* HLS init */}
                {item.type === 'hls' && React.useEffect(() => {
                    const v = document.getElementById(`vid-${item.id}`);
                    if(v && window.Hls && window.Hls.isSupported()) { const hls = new window.Hls(); hls.loadSource(item.url); hls.attachMedia(v); }
                }, [item.url])}

                {/* Avdan action bar — icon + count */}
                <div className="action-bar-avdan">
                    <button className={`avdan-action-btn ${item.liked ? 'active' : ''}`} onClick={toggleLike}>
                        <Heart style={item.liked ? {fill:'var(--accent)',width:24,height:24} : {width:24,height:24}}/>
                        <span>{formatNumber(Math.floor((item.savedAt||1)%500)*87 + (item.liked?1:0))}</span>
                    </button>
                    <button className="avdan-action-btn" onClick={() => setShowComments(true)}>
                        <MessageSquare style={{width:24,height:24}}/>
                        <span>{comments.length > 0 ? formatNumber(comments.length) : Math.floor((item.savedAt||1)%100)*12}</span>
                    </button>
                    <button className="avdan-action-btn" style={{position:'relative'}} onClick={() => setShowComments(true)}>
                        <Share2 style={{width:24,height:24}}/>
                        <span>{formatNumber(Math.floor((item.savedAt||1)%200)*3)}</span>
                    </button>
                    <button className="avdan-action-btn" style={{fontSize:10}}>
                        {/* bar chart stats icon */}
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                        <span>{formatNumber((item.savedAt%1000)*432)}</span>
                    </button>
                    <button className={`avdan-action-btn ${item.pinned ? 'active' : ''}`} onClick={togglePin}>
                        <Bookmark style={item.pinned ? {fill:'var(--accent)',width:24,height:24} : {width:24,height:24}}/>
                        <span>{formatNumber(Math.floor((item.savedAt||1)%300)*5 + (item.pinned?1:0))}</span>
                    </button>
                    <button className="avdan-action-btn" onClick={() => { try{navigator.clipboard.writeText(item.url||''); alert('Copied');}catch(e){} }}>
                        <Send style={{width:24,height:24}}/>
                        <span>{formatNumber(Math.floor((item.savedAt||1)%50)*23)}</span>
                    </button>
                </div>

                {/* Scrollable info body */}
                <div className="viewer-info hide-scroll">
                    <div className="viewer-info-inner">

                        {/* Title */}
                        <div className="viewer-title-row">
                            <h1 style={{fontFamily:'Syne,sans-serif',fontWeight:900,fontSize:22,color:'var(--text-main)',lineHeight:1.2,marginBottom:6}}>{item.title || 'Unknown Entity'}</h1>
                            <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                                <span style={{fontSize:12,fontWeight:700,color:'var(--text-muted)',letterSpacing:0.4}}>{new Date(item.savedAt||0).toLocaleDateString()}</span>
                                {item.url && <a href={item.url} target="_blank" style={{fontSize:11,fontWeight:700,color:'var(--accent)',background:'rgba(var(--accent-rgb),0.1)',padding:'4px 10px',borderRadius:8,border:'1px solid rgba(var(--accent-rgb),0.25)',display:'flex',alignItems:'center',gap:4,textDecoration:'none'}}><LinkIcon style={{width:11,height:11}}/>{cleanDomain}</a>}
                            </div>
                        </div>

                        {/* Channel row */}
                        <div className="viewer-channel-row">
                            <div className="viewer-channel-avatar">{(item.artist || item.title || '?')[0].toUpperCase()}</div>
                            <div>
                                <div className="viewer-channel-name" onClick={()=>item.artist&&executeTagClick(item.artist)} style={item.artist?{cursor:'pointer',color:'var(--accent)'}:{}}>{item.artist || 'Unknown'}</div>
                                <div className="viewer-channel-sub">{item.source || item.character || 'Original'}</div>
                            </div>
                            <button className="follow-btn active-bounce" onClick={()=>onUpdate(item.id,{following:!item.following})} style={item.following?{background:'var(--accent)',borderColor:'var(--accent)',color:'#fff'}:{}}>{item.following ? 'Following' : 'Follow'}</button>
                        </div>

                        {/* Meta card */}
                        <div className="meta-card">
                            <button onClick={()=>setIsEditingMeta(!isEditingMeta)} style={{position:'absolute',top:12,right:12,background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',padding:4}} className="active-bounce"><Edit3 style={{width:16,height:16}}/></button>
                            {isEditingMeta ? (
                                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                                    {[['Artist','artist'],['Character','character'],['Series','source']].map(([label,key])=>(
                                        <div key={key} style={{display:'flex',alignItems:'center',gap:8}}>
                                            <span className="meta-label">{label}</span>
                                            <input value={metaForm[key]} onChange={e=>setMetaForm({...metaForm,[key]:e.target.value})} style={{flex:1,background:'rgba(255,255,255,0.05)',border:'1px solid var(--border-color)',borderRadius:10,padding:'8px 12px',fontSize:13,fontWeight:700,color:'var(--text-main)',outline:'none'}} placeholder="Unknown..."/>
                                        </div>
                                    ))}
                                    <button onClick={()=>{onUpdate(item.id,{...metaForm});setIsEditingMeta(false);}} style={{width:'100%',background:'var(--accent)',color:'#fff',border:'none',borderRadius:12,padding:'10px',fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:1,cursor:'pointer',marginTop:4}} className="active-bounce">Save</button>
                                </div>
                            ) : (
                                <>
                                    {[['Artist',item.artist||'Unknown','artist'],['Character',item.character||'Original','character'],['Series',item.source||'Original','source']].map(([label,val,key])=>(
                                        <div className="meta-row" key={key}>
                                            <span className="meta-label">{label}</span>
                                            <span className="meta-value" onClick={()=>item[key]&&executeTagClick(item[key])} style={item[key]?{color:'var(--accent)',cursor:'pointer'}:{color:'var(--text-muted)'}}>{val}</span>
                                        </div>
                                    ))}
                                </>
                            )}
                        </div>

                        {/* Description */}
                        {item.description && (
                            <div style={{background:'var(--bg-input)',border:'1px solid var(--border-color)',borderRadius:20,padding:16,marginBottom:16}}>
                                <p style={{fontSize:13,color:'var(--text-main)',lineHeight:1.6,whiteSpace:'pre-wrap',display:descExpanded?'block':'-webkit-box',WebkitLineClamp:3,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{item.description}</p>
                                <button onClick={()=>setDescExpanded(!descExpanded)} style={{fontSize:11,fontWeight:700,color:'var(--accent)',textTransform:'uppercase',letterSpacing:1,background:'none',border:'none',cursor:'pointer',marginTop:8,padding:0}} className="active-bounce">{descExpanded?'Show Less':'Read More'}</button>
                            </div>
                        )}

                        {/* Tags */}
                        <div style={{marginBottom:16}}>
                            <h3 style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1.2,color:'var(--text-muted)',marginBottom:10,display:'flex',alignItems:'center',gap:6}}><Tag style={{width:14,height:14}}/> Tags</h3>
                            <div style={{display:'flex',flexWrap:'wrap',gap:8,alignItems:'center'}}>
                                {tags.map(t => (
                                    <span key={t} onClick={() => executeTagClick(t)} className="tag-chip group" style={{position:'relative',paddingRight:24}}>
                                        {t}
                                        <button onClick={(e)=>removeTag(t,e)} style={{position:'absolute',right:6,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'white',cursor:'pointer',padding:0,opacity:0.6}} className="active-bounce"><X style={{width:10,height:10}}/></button>
                                    </span>
                                ))}
                                {showTagInput ? (
                                    <input autoFocus value={newTag} onChange={e=>setNewTag(e.target.value)} onKeyDown={handleAddTag} onBlur={()=>setShowTagInput(false)} placeholder="add tag..." style={{fontSize:11,fontWeight:700,padding:'8px 14px',borderRadius:999,background:'var(--bg-input)',border:'1.5px dashed var(--border-color)',color:'var(--text-main)',outline:'none',width:110}}/>
                                ) : (
                                    <button onClick={()=>setShowTagInput(true)} style={{fontSize:11,fontWeight:700,padding:'8px 14px',borderRadius:999,background:'var(--bg-input)',border:'1px solid var(--border-color)',color:'var(--text-main)',cursor:'pointer',display:'flex',alignItems:'center',gap:4}} className="active-bounce"><Plus style={{width:12,height:12}}/>Add</button>
                                )}
                            </div>
                        </div>

                        {/* AI auto-tag button */}
                        <button onClick={() => onAI(item)} style={{width:'100%',background:'rgba(var(--accent-rgb),0.1)',border:'1.5px solid rgba(var(--accent-rgb),0.3)',color:'var(--accent)',borderRadius:16,padding:'12px',fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:1,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:24}} className="active-bounce">
                            <Bot style={{width:18,height:18}}/> Auto-Tag with AI
                        </button>

                        {/* Related */}
                        {related.length > 0 && (
                            <div style={{borderTop:'1px solid var(--border-color)',paddingTop:20}}>
                                <h3 style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1.2,color:'var(--text-muted)',marginBottom:12,display:'flex',alignItems:'center',gap:6}}><Grid3X3 style={{width:14,height:14}}/> Similar</h3>
                                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                                    {related.map(r => {
                                        const rThumb = getThumbnail(r);
                                        return (
                                            <div key={r.id} style={{position:'relative',aspectRatio:'4/5',borderRadius:20,overflow:'hidden',background:'var(--bg-input)',cursor:'pointer'}} className="active-bounce" onClick={() => { onClose(); setTimeout(()=>onUpdate('view', r), 100); }}>
                                                {rThumb ? <img src={rThumb} style={{width:'100%',height:'100%',objectFit:'cover'}} loading="lazy" onError={(e)=>{e.target.style.display='none'; e.target.nextSibling.style.display='flex'}}/> : null}
                                                <div style={{display:rThumb?'none':'flex', width:'100%',height:'100%',alignItems:'center',justifyContent:'center'}}><LinkIcon style={{width:28,height:28,color:'var(--text-muted)'}}/></div>
                                                {['video','hls','youtube'].includes(r.type) && <div style={{position:'absolute',top:8,right:8,width:28,height:28,borderRadius:'50%',background:'rgba(0,0,0,0.6)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center'}}><Play style={{width:12,height:12,color:'white',fill:'white',marginLeft:2}}/></div>}
                                                <div style={{position:'absolute',bottom:0,insetInline:0,padding:'20px 10px 10px 10px',background:'linear-gradient(to top, rgba(0,0,0,0.85), transparent)'}}>
                                                    <span style={{color:'white',fontSize:11,fontWeight:700,display:'block',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.title||r.type}</span>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )}
                    </div>
                </div>

                {/* Comment Drawer */}
                {showComments && (
                    <div className="fixed inset-x-0 bottom-0 z-[550] glass-heavy rounded-t-[32px] p-6 slide-up max-h-[75vh] flex flex-col border-t border-[var(--border-color)] shadow-[0_-10px_50px_rgba(0,0,0,0.5)]">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="syne font-bold text-xl uppercase tracking-widest text-[var(--text-main)]">Comments ({comments.length})</h3>
                            <button onClick={() => setShowComments(false)} className="w-10 h-10 bg-[var(--bg-input)] rounded-full flex items-center justify-center spring-anim active-bounce touch-ripple"><X className="w-5 h-5"/></button>
                        </div>
                        <div className="flex-1 overflow-y-auto space-y-4 mb-6 hide-scroll">
                            {comments.map((c, i) => (
                                <div key={i} className="bg-[var(--bg-input)] p-4 rounded-[20px] border border-[var(--border-color)]">
                                    <p className="text-[10px] text-[var(--text-muted)] mb-2 uppercase tracking-widest font-bold">{new Date(c.date).toLocaleString()}</p>
                                    <p className="text-sm font-medium leading-relaxed">{c.text}</p>
                                </div>
                            ))}
                            {comments.length === 0 && <p className="text-center text-[var(--text-muted)] text-sm my-10 font-bold uppercase tracking-widest">No comments yet.</p>}
                        </div>
                        <div className="flex gap-3">
                            <input value={newComment} onChange={e=>setNewComment(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleAddComment()} placeholder="Add a comment..." className="flex-1 bg-[var(--bg-input)] border border-[var(--border-color)] rounded-[20px] p-4 outline-none text-sm focus:border-accent spring-anim" />
                            <button onClick={handleAddComment} className="w-14 rounded-[20px] bg-accent flex justify-center items-center text-white active-bounce shadow-lg shadow-accent/30"><Send className="w-5 h-5"/></button>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    /* ═══ SMART INJECT MODAL ═══ */
    const AddModal = ({ onClose, onSave }) => {
        const [inputVal, setInputVal] = useState('');
        const [fetching, setFetching] = useState(false);
        const [bulkLinks, setBulkLinks] = useState([]); // auto-detected multi-url mode
        const [importing, setImporting] = useState(false);
        const [importDone, setImportDone] = useState(false);

        const isBulkMode = bulkLinks.length > 0;
        const [uploading, setUploading] = useState(false);
        const fileInputRef = useRef(null);

        const handleGalleryPick = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            setUploading(true);
            try {
                const { primary, imgbbUrl, cloudUrl } = await uploadMediaFile(file);
                const isVid = file.type.startsWith('video/');
                const type = isVid ? 'video' : 'image';
                let finalThumb = null, finalDuration = null, finalIsPortrait = false;
                if (isVid) {
                    const meta = await generateVideoMeta(primary, 'video');
                    finalThumb = meta.thumb; finalDuration = meta.duration; finalIsPortrait = meta.isPortrait;
                } else { finalThumb = primary; }
                await onSave({ url: primary, type, site: 'Gallery', collection: 'RAW', thumb: finalThumb, title: file.name.replace(/\.[^.]+$/, '') || 'Gallery Upload', duration: finalDuration, isPortrait: finalIsPortrait, tags: [type, 'gallery'], artist: '', character: '', source: '', description: '', imgbbUrl, cloudUrl, healed: true });
                onClose();
            } catch(e) { alert('Upload failed: ' + e.message); }
            finally { setUploading(false); }
        };

        // Called on every textarea change — auto-detects multiple URLs
        const handleChange = (e) => {
            const val = e.target.value;
            setInputVal(val);
            const urls = val.split(/[\n,]+/).map(s => s.trim()).filter(s => /^https?:\/\//i.test(s));
            const unique = [...new Set(urls)];
            if (unique.length >= 2) {
                setBulkLinks(unique.map(url => ({ url, status: 'pending' })));
            } else {
                setBulkLinks([]);
                setImportDone(false);
            }
        };

        const removeLink = (i) => setBulkLinks(prev => prev.filter((_, idx) => idx !== i));

        const saveOneUrl = async (url) => {
            const type = getMediaType(url); const site = getDomain(url);
            let finalThumb = null, finalDuration = null, finalIsPortrait = false;
            if (['video','hls'].includes(type)) {
                const vMeta = await generateVideoMeta(url, type);
                finalThumb = vMeta.thumb; finalDuration = vMeta.duration; finalIsPortrait = vMeta.isPortrait;
            } else if (type === 'image') { finalThumb = url; }
            else { finalThumb = await fetchMetaImage(url); }
            await onSave({ url, type, site, collection: 'RAW', thumb: finalThumb, title: 'New Item', duration: finalDuration, isPortrait: finalIsPortrait, tags: [type], artist: '', character: '', source: '', description: '', healed: true });
        };

        const handleBulkImport = async () => {
            setImporting(true);
            for (let i = 0; i < bulkLinks.length; i++) {
                if (bulkLinks[i].status === 'done') continue;
                setBulkLinks(prev => prev.map((l, idx) => idx === i ? { ...l, status: 'saving' } : l));
                try {
                    await saveOneUrl(bulkLinks[i].url);
                    setBulkLinks(prev => prev.map((l, idx) => idx === i ? { ...l, status: 'done' } : l));
                } catch(e) {
                    setBulkLinks(prev => prev.map((l, idx) => idx === i ? { ...l, status: 'error' } : l));
                }
            }
            setImporting(false);
            setImportDone(true);
        };

        const handleSingleSave = async () => {
            const val = inputVal.trim();
            if (!val) return;
            setFetching(true);
            try {
                const urlLines = val.split(/\n+/).map(l => l.trim()).filter(l => /^https?:\/\//i.test(l));
                if (urlLines.length >= 2) {
                    const directImg = urlLines.find(l => /\.(jpg|jpeg|png|webp|gif|avif)(\?|$)/i.test(l));
                    const directVid = urlLines.find(l => /\.(mp4|m3u8|webm|mov)(\?|$)/i.test(l) || /fbcdn\.net/i.test(l));
                    const pageUrl = urlLines.find(l => l !== directImg && l !== directVid);
                    if (directImg && pageUrl) { await onSave({ url: directImg, type: 'image', site: getDomain(pageUrl), collection: 'RAW', thumb: directImg, title: 'New Item', duration: null, isPortrait: false, tags: ['image'], artist: '', character: '', source: pageUrl, description: '', healed: true }); return; }
                    if (directVid && pageUrl) { const pt = getMediaType(directVid); const pm = await generateVideoMeta(directVid, pt); let pth = pm.thumb; if (!pth) pth = await fetchMetaImage(pageUrl); await onSave({ url: directVid, type: pt, site: getDomain(pageUrl), collection: 'RAW', thumb: pth, title: 'New Item', duration: pm.duration, isPortrait: pm.isPortrait, tags: [pt], artist: '', character: '', source: pageUrl, description: '', healed: true }); return; }
                }
                // Drive link auto-convert
                if (isDriveUrl(val.trim())) {
                    const driveMatch = val.trim().match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
                    const driveThumb = driveMatch ? `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w400` : null;
                    await onSave({ url: val.trim(), type: 'drive', site: 'Google Drive', collection: 'RAW', thumb: driveThumb, title: 'Drive File', duration: null, isPortrait: false, tags: ['drive', 'video'], artist: '', character: '', source: '', description: '', healed: true });
                    return;
                }
                const isEmbed = val.startsWith('<iframe') || val.includes('<script');
                const isUrl = /^https?:\/\//i.test(val) && !/\s/.test(val);
                if (isEmbed) { await onSave({ url: '', content: val, type: 'embed', site: 'Embedded', collection: 'RAW', thumb: null, title: 'Embedded Content', duration: null, isPortrait: false, tags: ['embed'], artist: '', character: '', source: '', description: '' }); }
                else if (isUrl) {
                    const safeUrl = val.startsWith('http') ? val : `https://${val}`;
                    const type = getMediaType(safeUrl); const site = getDomain(safeUrl);
                    let finalThumb = null, finalDuration = null, finalIsPortrait = false;
                    if (['video','hls'].includes(type)) { const vMeta = await generateVideoMeta(safeUrl, type); finalThumb = vMeta.thumb; finalDuration = vMeta.duration; finalIsPortrait = vMeta.isPortrait; }
                    else if (type === 'link') { finalThumb = await fetchMetaImage(safeUrl); }
                    await onSave({ url: safeUrl, type, site, collection: 'RAW', thumb: finalThumb, title: 'New Item', duration: finalDuration, isPortrait: finalIsPortrait, tags: [type], artist: '', character: '', source: '', description: '', healed: true });
                } else {
                    const titleMatch = val.split('\n')[0].substring(0, 40);
                    await onSave({ url: '', content: val, type: 'note', site: 'Note', collection: 'Notes', thumb: null, title: titleMatch || 'Untitled Note', duration: null, isPortrait: false, tags: ['note'], artist: '', character: '', source: '', description: val.substring(0, 100) });
                }
            } catch(e) { alert("Upload failed: " + e.message); }
            finally { setFetching(false); onClose(); }
        };

        const statusIcon = (status) => {
            if (status === 'pending') return <span style={{fontSize:14,color:'var(--text-muted)'}}>○</span>;
            if (status === 'saving') return <Loader style={{width:14,height:14,color:'var(--accent)'}} className="animate-spin"/>;
            if (status === 'done') return <span style={{fontSize:14,color:'#22c55e'}}>✓</span>;
            if (status === 'error') return <span style={{fontSize:14,color:'#ef4444'}}>✗</span>;
        };

        const doneCount = bulkLinks.filter(l => l.status === 'done').length;
        const errCount = bulkLinks.filter(l => l.status === 'error').length;

        return (
            <div className="fixed inset-0 z-[500] bg-[var(--overlay)] backdrop-blur-md flex items-end sm:items-center justify-center sm:p-4" onClick={e => e.target===e.currentTarget && onClose()}>
                <div className="w-full max-w-md glass-heavy rounded-t-[32px] sm:rounded-[32px] p-6 slide-up border border-[var(--border-color)] shadow-2xl" style={{maxHeight:'85vh',display:'flex',flexDirection:'column'}}>
                    
                    <div className="flex justify-between items-center mb-4" style={{flexShrink:0}}>
                        <div>
                            <h2 className="syne text-xl font-bold uppercase tracking-widest text-[var(--text-main)]">{isBulkMode ? 'Bulk Import' : 'Inject Asset'}</h2>
                            {isBulkMode && <p style={{fontSize:11,color:'var(--accent)',fontWeight:700,letterSpacing:1,marginTop:2}}>{bulkLinks.length} LINKS DETECTED</p>}
                        </div>
                        <button onClick={onClose} className="w-10 h-10 bg-[var(--bg-input)] rounded-full flex items-center justify-center spring-anim active-bounce"><X className="w-5 h-5"/></button>
                    </div>

                    {/* Textarea — always visible, shrinks in bulk mode */}
                    <textarea
                        className="w-full p-4 rounded-[20px] bg-[var(--bg-input)] border border-[var(--border-color)] outline-none focus:border-[var(--accent)] spring-anim text-sm font-bold resize-none shadow-inner"
                        style={{minHeight: isBulkMode ? 60 : 140, marginBottom:12, flexShrink:0, transition:'min-height 0.3s'}}
                        placeholder="Paste one link, many links, a note, or embed HTML..."
                        value={inputVal}
                        onChange={handleChange}
                    />

                    {/* BULK MODE: live link list */}
                    {isBulkMode && (
                        <div style={{flex:1,overflowY:'auto',marginBottom:12,display:'flex',flexDirection:'column',gap:8}}>
                            {bulkLinks.map((l, i) => (
                                <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:14,background:'var(--bg-input)',border:`1px solid ${l.status==='done'?'rgba(34,197,94,0.3)':l.status==='error'?'rgba(239,68,68,0.3)':'var(--border-color)'}`,transition:'border-color 0.3s'}}>
                                    <div style={{flexShrink:0,width:20,display:'flex',justifyContent:'center'}}>{statusIcon(l.status)}</div>
                                    <span style={{flex:1,fontSize:11,fontWeight:700,color:'var(--text-main)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.url}</span>
                                    {!importing && l.status === 'pending' && (
                                        <button onClick={()=>removeLink(i)} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',padding:0,flexShrink:0}} className="active-bounce"><X style={{width:13,height:13}}/></button>
                                    )}
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Done summary */}
                    {importDone && (
                        <div style={{flexShrink:0,padding:'10px 14px',borderRadius:14,background:'rgba(34,197,94,0.08)',border:'1px solid rgba(34,197,94,0.25)',marginBottom:12,fontSize:12,fontWeight:700,display:'flex',gap:16,justifyContent:'center'}}>
                            <span style={{color:'#22c55e'}}>✓ {doneCount} saved</span>
                            {errCount > 0 && <span style={{color:'#ef4444'}}>✗ {errCount} failed</span>}
                        </div>
                    )}

                    {/* Gallery upload button */}
                    {!isBulkMode && (
                        <div style={{flexShrink:0,marginBottom:10}}>
                            <input ref={fileInputRef} type="file" accept="image/*,video/*" style={{display:'none'}} onChange={handleGalleryPick}/>
                            <button onClick={()=>fileInputRef.current.click()} disabled={uploading} className="active-bounce touch-ripple" style={{width:'100%',padding:'13px',borderRadius:16,background:'rgba(255,255,255,0.06)',border:'1.5px solid rgba(255,255,255,0.15)',color:'#fff',fontSize:11,fontWeight:800,letterSpacing:2,textTransform:'uppercase',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                                {uploading ? <><Loader style={{width:15,height:15}} className="animate-spin"/> Uploading...</> : <><Camera style={{width:15,height:15}}/> Upload from Gallery</>}
                            </button>
                        </div>
                    )}

                    {/* Action button */}
                    <div style={{flexShrink:0}}>
                        {!isBulkMode && (
                            <button onClick={handleSingleSave} disabled={fetching} className="btn-action btn-primary active-bounce text-sm shadow-xl touch-ripple">
                                {fetching ? <Loader className="w-5 h-5 animate-spin"/> : 'Upload Node'}
                            </button>
                        )}
                        {isBulkMode && !importDone && !importing && (
                            <button onClick={handleBulkImport} className="btn-action btn-primary active-bounce text-sm touch-ripple">
                                Import {bulkLinks.length} Links
                            </button>
                        )}
                        {importing && (
                            <div className="btn-action btn-secondary" style={{justifyContent:'center',gap:8}}>
                                <Loader className="w-4 h-4 animate-spin"/> Importing...
                            </div>
                        )}
                        {importDone && (
                            <button onClick={onClose} className="btn-action btn-primary active-bounce text-sm touch-ripple">Done</button>
                        )}
                    </div>
                </div>
            </div>
        );
    };

    /* ═══ BULK IMPORT MODAL ═══ */
    const BulkImportModal = ({ onClose, onSave }) => {
        const [links, setLinks] = useState([]); // [{url, status: 'pending'|'saving'|'done'|'error', msg}]
        const [importing, setImporting] = useState(false);
        const [done, setDone] = useState(false);

        const parsePaste = (text) => {
            const urls = text
                .split(/[\n,]+/)
                .map(s => s.trim())
                .filter(s => /^https?:\/\//i.test(s));
            return [...new Set(urls)].map(url => ({ url, status: 'pending', msg: '' }));
        };

        const handlePaste = async () => {
            try {
                const text = await navigator.clipboard.readText();
                const parsed = parsePaste(text);
                if (parsed.length === 0) { alert('No valid URLs found in clipboard.'); return; }
                setLinks(parsed);
                setDone(false);
            } catch(e) {
                alert('Clipboard access denied. Please allow clipboard permission.');
            }
        };

        const saveOneUrl = async (url) => {
            const type = getMediaType(url);
            const site = getDomain(url);
            let finalThumb = null, finalDuration = null, finalIsPortrait = false;
            if (['video','hls'].includes(type)) {
                const vMeta = await generateVideoMeta(url, type);
                finalThumb = vMeta.thumb; finalDuration = vMeta.duration; finalIsPortrait = vMeta.isPortrait;
            } else if (type === 'image') {
                finalThumb = url;
            } else {
                finalThumb = await fetchMetaImage(url);
            }
            await onSave({ url, type, site, collection: 'RAW', thumb: finalThumb, title: 'New Item', duration: finalDuration, isPortrait: finalIsPortrait, tags: [type], artist: '', character: '', source: '', description: '', healed: true });
        };

        const handleImport = async () => {
            if (links.length === 0) return;
            setImporting(true);
            for (let i = 0; i < links.length; i++) {
                setLinks(prev => prev.map((l, idx) => idx === i ? { ...l, status: 'saving' } : l));
                try {
                    await saveOneUrl(links[i].url);
                    setLinks(prev => prev.map((l, idx) => idx === i ? { ...l, status: 'done' } : l));
                } catch(e) {
                    setLinks(prev => prev.map((l, idx) => idx === i ? { ...l, status: 'error', msg: e.message } : l));
                }
            }
            setImporting(false);
            setDone(true);
        };

        const removeLink = (i) => setLinks(prev => prev.filter((_, idx) => idx !== i));

        const statusIcon = (status) => {
            if (status === 'pending') return <span style={{fontSize:14,color:'var(--text-muted)'}}>○</span>;
            if (status === 'saving') return <Loader style={{width:14,height:14,color:'var(--accent)'}} className="animate-spin"/>;
            if (status === 'done') return <span style={{fontSize:14,color:'#22c55e'}}>✓</span>;
            if (status === 'error') return <span style={{fontSize:14,color:'#ef4444'}}>✗</span>;
        };

        const doneCount = links.filter(l => l.status === 'done').length;
        const errCount = links.filter(l => l.status === 'error').length;

        return (
            <div className="fixed inset-0 z-[500] bg-[var(--overlay)] backdrop-blur-md flex items-end sm:items-center justify-center sm:p-4" onClick={e => e.target===e.currentTarget && onClose()}>
                <div className="w-full max-w-md glass-heavy rounded-t-[32px] sm:rounded-[32px] p-6 slide-up border border-[var(--border-color)] shadow-2xl" style={{maxHeight:'85vh',display:'flex',flexDirection:'column'}}>
                    
                    {/* Header */}
                    <div className="flex justify-between items-center mb-5" style={{flexShrink:0}}>
                        <div>
                            <h2 className="syne text-xl font-bold uppercase tracking-widest text-[var(--text-main)]">Bulk Import</h2>
                            <p style={{fontSize:11,color:'var(--text-muted)',fontWeight:700,letterSpacing:1,marginTop:2}}>PASTE CLIPBOARD → AUTO SPLIT</p>
                        </div>
                        <button onClick={onClose} className="w-10 h-10 bg-[var(--bg-input)] rounded-full flex items-center justify-center spring-anim active-bounce"><X className="w-5 h-5"/></button>
                    </div>

                    {/* Paste button */}
                    {!importing && (
                        <button onClick={handlePaste} className="active-bounce touch-ripple mb-4" style={{flexShrink:0,width:'100%',padding:'14px',borderRadius:16,background:'rgba(var(--accent-rgb),0.1)',border:'1.5px dashed rgba(var(--accent-rgb),0.5)',color:'var(--accent)',fontSize:13,fontWeight:800,letterSpacing:1.5,textTransform:'uppercase',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                            <Plus style={{width:18,height:18}}/> Paste from Clipboard
                        </button>
                    )}

                    {/* Link list */}
                    {links.length > 0 && (
                        <div style={{flex:1,overflowY:'auto',marginBottom:12,display:'flex',flexDirection:'column',gap:8}}>
                            {links.map((l, i) => (
                                <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:14,background:'var(--bg-input)',border:`1px solid ${l.status==='done'?'rgba(34,197,94,0.3)':l.status==='error'?'rgba(239,68,68,0.3)':'var(--border-color)'}`,transition:'border-color 0.3s'}}>
                                    <div style={{flexShrink:0,width:20,display:'flex',justifyContent:'center'}}>{statusIcon(l.status)}</div>
                                    <span style={{flex:1,fontSize:11,fontWeight:700,color:'var(--text-main)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.url}</span>
                                    {!importing && l.status === 'pending' && (
                                        <button onClick={()=>removeLink(i)} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',padding:0,flexShrink:0}} className="active-bounce"><X style={{width:14,height:14}}/></button>
                                    )}
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Empty state */}
                    {links.length === 0 && (
                        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'var(--text-muted)',gap:8,paddingBottom:16}}>
                            <LinkIcon style={{width:32,height:32,opacity:0.3}}/>
                            <p style={{fontSize:12,fontWeight:700,letterSpacing:1,opacity:0.5}}>NO LINKS YET</p>
                        </div>
                    )}

                    {/* Summary after done */}
                    {done && (
                        <div style={{flexShrink:0,padding:'10px 14px',borderRadius:14,background:'rgba(34,197,94,0.08)',border:'1px solid rgba(34,197,94,0.25)',marginBottom:12,fontSize:12,fontWeight:700,color:'var(--text-main)',display:'flex',gap:16,justifyContent:'center'}}>
                            <span style={{color:'#22c55e'}}>✓ {doneCount} saved</span>
                            {errCount > 0 && <span style={{color:'#ef4444'}}>✗ {errCount} failed</span>}
                        </div>
                    )}

                    {/* Action buttons */}
                    <div style={{flexShrink:0,display:'flex',gap:10}}>
                        {!done && links.length > 0 && !importing && (
                            <button onClick={handleImport} className="btn-action btn-primary active-bounce touch-ripple" style={{flex:1,fontSize:12}}>
                                Import {links.length} Link{links.length!==1?'s':''}
                            </button>
                        )}
                        {importing && (
                            <div className="btn-action btn-secondary" style={{flex:1,fontSize:12,justifyContent:'center',gap:8}}>
                                <Loader className="w-4 h-4 animate-spin"/> Importing...
                            </div>
                        )}
                        {done && (
                            <button onClick={onClose} className="btn-action btn-primary active-bounce touch-ripple" style={{flex:1,fontSize:12}}>
                                Done
                            </button>
                        )}
                    </div>
                </div>
            </div>
        );
    };

    /* ═══ MAIN APPLICATION CONTROLLER ═══ */
    function App() {
        const [user, setUser] = useState(null);
        const [items, setItems] = useState([]);
        const [itemsLoading, setItemsLoading] = useState(true);
        const [search, setSearch] = useState('');
        const [activeTag, setActiveTag] = useState('');
        const [typeFilter, setTypeFilter] = useState('all'); 
        
        const [currentTab, setCurrentTab] = useState('home'); // home, search, watch, settings
        const [layoutMode, setLayoutMode] = useState(() => localStorage.getItem('nxs_layout') || 'grid'); 
        const [selectedItem, setSelectedItem] = useState(null);
        const [showAdd, setShowAdd] = useState(false);
        
        const [theme, setTheme] = useState(() => localStorage.getItem('nxs_theme') || 'dark');
        const [appColor, setAppColor] = useState(() => localStorage.getItem('nxs_color') || 'pintrest');
        const [aiConfig, setAiConfig] = useState(() => ({ provider: localStorage.getItem('nxs_ai_provider') || 'native', key: localStorage.getItem('nxs_ai_key') || '', model: localStorage.getItem('nxs_ai_model') || '' }));

        useEffect(() => { localStorage.setItem('nxs_layout', layoutMode); }, [layoutMode]);
        useEffect(() => { 
            if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light'); 
            else document.documentElement.removeAttribute('data-theme'); 
            localStorage.setItem('nxs_theme', theme); 
        }, [theme]);
        useEffect(() => { 
            const rgb = THEMES[appColor] || THEMES.pintrest; 
            document.documentElement.style.setProperty('--accent-rgb', rgb); 
            document.documentElement.style.setProperty('--accent', `rgb(${rgb})`); 
            localStorage.setItem('nxs_color', appColor); 
        }, [appColor]);

        useEffect(() => { const unsub = onAuthStateChanged(auth, u => setUser(u)); return unsub; }, []);
        useEffect(() => {
            if (!user) return;
            const unsub = onSnapshot(query(collection(db, 'artifacts', APP_ID, 'users', user.uid, 'vault_items')), snap => {
                const data = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.pinned ? 1 : 0) > (a.pinned ? 1 : 0) ? 1 : -1 || (b.savedAt||0) - (a.savedAt||0));
                setItems(data);
                setItemsLoading(false);
            });
            return unsub;
        }, [user]);

        // BACKGROUND AUTO-HEAL: Automatically fix broken link thumbnails
        useEffect(() => {
            if (!user || items.length === 0) return;
            const healLinks = async () => {
                const brokenItems = items.filter(i => i.type === 'link' && !i.thumb && i.url && !i.healed
                    && !i.url.includes('instagram.com') && !i.url.includes('pinterest.com'));
                if (brokenItems.length === 0) return;
                for (const item of brokenItems.slice(0, 3)) {
                    try {
                        let newThumb = await fetchMetaImage(item.url);
                        await updateDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'vault_items', item.id), { thumb: newThumb || null, healed: true });
                    } catch (e) {
                        await updateDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'vault_items', item.id), { healed: true });
                    }
                }
            };
            const timer = setTimeout(healLinks, 10000);
            return () => clearTimeout(timer);
        }, [user, items]);

        const triggerAIAutoTag = async (docId, contentToAnalyze, type) => {
            if(!aiConfig.provider || (aiConfig.provider !== 'native' && !aiConfig.key)) return;
            try {
                const prompt = `Analyze this context (URL or Text Content): ${contentToAnalyze}. Type: ${type}. Return ONLY a JSON object with these exact keys: "title" (short descriptive title, do not use raw URLs), "description" (1-2 sentences), "artist" (name or "Unknown"), "character" (name or "Original"), "source" (series/site or "Original"), "tags" (array of 3-5 relevant lowercase tags).`;
                const res = await handleAIQuery(aiConfig, prompt, true);
                let jsonStr = res;
                if(res.includes('```json')) jsonStr = res.split('```json')[1].split('```')[0];
                const data = JSON.parse(jsonStr.trim());
                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'vault_items', docId), {
                    title: data.title && data.title.length < 50 ? data.title : 'Processed Media',
                    description: data.description || '', artist: data.artist || 'Unknown',
                    character: data.character || 'Original', source: data.source || getDomain(contentToAnalyze), tags: data.tags || [type]
                });
            } catch(e) { console.log("AI Auto-tag silent fail"); }
        };

        const handleSave = async (data) => {
            const docRef = await addDoc(collection(db, 'artifacts', APP_ID, 'users', user.uid, 'vault_items'), { ...data, savedAt: Date.now(), pinned: false, liked: false, comments: [] });
            const aiTarget = data.url || data.content;
            if(aiTarget) triggerAIAutoTag(docRef.id, aiTarget, data.type);
        };
        const handleUpdate = async (id, data) => {
            if (id === 'view') return setSelectedItem(data);
            await updateDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'vault_items', id), data);
            if (selectedItem?.id === id) setSelectedItem(prev => ({...prev, ...data}));
        };
        const handleDelete = async (id) => {
            if (!confirm('Purge asset?')) return;
            await deleteDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'vault_items', id));
            setSelectedItem(null);
        };
        const handleAI = async (item) => { triggerAIAutoTag(item.id, item.url || item.content, item.type); alert("AI extraction triggered. Metadata will update shortly."); };

        const filteredItems = useMemo(() => {
            return items.filter(i => {
                const term = search.toLowerCase();
                const matchSearch = !term || [i.title, i.artist, i.character, i.source, ...(i.tags||[])].some(v => (v||'').toLowerCase().includes(term));
                const matchTag = !activeTag || (i.tags && i.tags.includes(activeTag)) || i.artist === activeTag || i.character === activeTag || i.source === activeTag;
                const matchType = typeFilter === 'all' || i.type === typeFilter || (typeFilter === 'video' && ['hls','youtube'].includes(i.type));
                return matchSearch && matchTag && matchType;
            });
        }, [items, search, activeTag, typeFilter]);

        if (!user) return <AuthScreen />;

        const isList = layoutMode === 'list'; const isBento = layoutMode === 'bento'; const isFeed = layoutMode === 'feed'; const isPinterestGrid = layoutMode === 'grid';
        const filters = ['All', 'Video', 'Image', 'Link', 'Note'];

        const allTags = Array.from(new Set(items.flatMap(i => i.tags || []))).slice(0, 30);

        return (
            <div className="min-h-screen relative">
                
                {/* === HOME TAB === */}
                {currentTab === 'home' && (
                    <main className="max-w-4xl mx-auto p-4 pt-6 pb-32">
                        {/* Filter Tags */}
                        <div className="flex gap-2 overflow-x-auto hide-scroll pb-3 mb-3">
                            {filters.map(f => (
                                <button key={f} onClick={()=>setTypeFilter(f.toLowerCase())} className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap spring-anim transition-all active-bounce touch-ripple ${typeFilter === f.toLowerCase() ? 'bg-[var(--text-main)] text-[var(--bg-base)] shadow-md' : 'bg-[var(--bg-input)] text-[var(--text-main)] hover:bg-[var(--border-color)]'}`}>
                                    {f}
                                </button>
                            ))}
                        </div>
                        {activeTag && (
                            <div className="flex items-center mb-5">
                                <span onClick={() => setActiveTag('')} className="tag-chip !bg-[var(--text-main)] !text-[var(--bg-base)] flex items-center gap-1 shadow-md px-4 py-2 text-xs rounded-full active-bounce touch-ripple">
                                    <Tag className="w-3 h-3"/> {activeTag} <X className="w-3 h-3 ml-1"/>
                                </span>
                            </div>
                        )}
                        
                        {itemsLoading ? (
                            <div className="columns-2 gap-3" style={{columnFill:'balance'}}>
                                {[...Array(8)].map((_,i) => (
                                    <div key={i} className="break-inside-avoid mb-3 rounded-[24px] overflow-hidden skeleton-pulse" style={{height: [160,220,180,260,150,200,240,170][i]+'px', animationDelay: (i*0.08)+'s'}}/>
                                ))}
                            </div>
                        ) : isPinterestGrid ? (
                            <PinterestMasonry items={filteredItems} onSelect={setSelectedItem} onUpdate={handleUpdate} />
                        ) : (
                            <div className={`grid gap-3 md:gap-4 ${isBento ? 'grid-flow-dense' : ''} ${
                                layoutMode === 'compact' ? 'grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-2' : 
                                layoutMode === 'bento' ? 'grid-cols-2 md:grid-cols-3' :
                                layoutMode === 'feed' ? 'grid-cols-1 max-w-xl mx-auto' : 'grid-cols-1'
                            }`}>
                                {filteredItems.map((item, index) => {
                                    const bentoWide = isBento && (index % 3 === 2);
                                    const thumb = getThumbnail(item);
                                    return (
                                        <div key={item.id} onClick={() => setSelectedItem(item)} style={{animationDelay: (index*0.04)+'s'}} className={`stagger-item glass-card overflow-hidden cursor-pointer group relative border border-transparent hover:border-accent/50 spring-anim ${
                                            isList ? 'flex h-28 rounded-[24px] hover-bounce active-bounce' : 
                                            layoutMode === 'compact' ? 'aspect-square rounded-[20px] hover-bounce active-bounce' : 
                                            isBento ? (bentoWide ? 'col-span-2 aspect-video rounded-[32px] hover-bounce active-bounce' : 'col-span-1 aspect-square rounded-[32px] hover-bounce active-bounce') :
                                            isFeed ? 'flex flex-col rounded-[32px] mb-4 bg-[var(--bg-modal)] shadow-lg active-bounce' : ''
                                        }`}>
                                            <div className={`relative bg-black/40 ${isList ? 'w-28 h-full shrink-0' : isFeed ? 'w-full aspect-[4/5] sm:aspect-[3/4]' : 'w-full h-full'}`}>
                                                {thumb ? (
                                                    <img src={thumb} className={`w-full h-full ${isFeed ? 'object-cover' : 'object-cover'}`} loading="lazy" onError={(e)=>{e.target.style.display='none'; e.target.nextSibling.style.display='flex'}}/>
                                                ) : item.type === 'embed' ? (
                                                    <div className="w-full h-full relative bg-black overflow-hidden">
                                                        <iframe
